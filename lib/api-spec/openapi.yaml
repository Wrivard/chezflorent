openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
  - name: events
    description: Agenda events
  - name: menu
    description: Menu categories and items
  - name: hours
    description: Opening hours
  - name: photos
    description: Site photos
  - name: group
    description: Groups & privatisation page content
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in as an admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLogin"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getCurrentAdmin
      tags: [auth]
      summary: Get the currently authenticated admin
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the authenticated admin's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePassword"
      responses:
        "204":
          description: Password changed
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated or wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List agenda events
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events/{id}:
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List contact messages (admin)
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createMessage
      tags: [messages]
      summary: Submit a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /messages/{id}:
    patch:
      operationId: updateMessage
      tags: [messages]
      summary: Update a message (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /menu:
    get:
      operationId: getMenu
      tags: [menu]
      summary: Get the full menu (categories with items)
      responses:
        "200":
          description: Menu
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"
  /menu/categories:
    post:
      operationId: createMenuCategory
      tags: [menu]
      summary: Create a menu category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategoryBase"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /menu/categories/{id}:
    patch:
      operationId: updateMenuCategory
      tags: [menu]
      summary: Update a menu category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuCategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategoryBase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMenuCategory
      tags: [menu]
      summary: Delete a menu category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /menu/untappd-sync:
    post:
      operationId: syncUntappdMenu
      tags: [menu]
      summary: Re-import the drinks menu from Untappd immediately
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [categories, items]
                properties:
                  categories:
                    type: integer
                  items:
                    type: integer
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Untappd unreachable or unparseable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /menu/items:
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /menu/items/{id}:
    patch:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /hours:
    get:
      operationId: listHours
      tags: [hours]
      summary: List opening hours for each day of the week
      responses:
        "200":
          description: Hours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hours"
  /hours/{dayOfWeek}:
    patch:
      operationId: updateHours
      tags: [hours]
      summary: Update opening hours for a day of the week (0=Sunday..6=Saturday)
      parameters:
        - name: dayOfWeek
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HoursUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hours"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List site photos
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SitePhoto"
  /photos/{slot}:
    patch:
      operationId: updatePhoto
      tags: [photos]
      summary: Update a site photo by slot
      parameters:
        - name: slot
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SitePhotoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitePhoto"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /group-content:
    get:
      operationId: getGroupContent
      tags: [group]
      summary: Get the Groups page content
      responses:
        "200":
          description: Group page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupContent"
    put:
      operationId: updateGroupContent
      tags: [group]
      summary: Replace the Groups page content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupContent"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupContent"
        "400":
          description: Invalid content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /about-content:
    get:
      operationId: getAboutContent
      tags: [about]
      summary: Get the About page content
      responses:
        "200":
          description: About page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AboutContent"
    put:
      operationId: updateAboutContent
      tags: [about]
      summary: Replace the About page content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AboutContent"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AboutContent"
        "400":
          description: Invalid content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /menu-marquee:
    get:
      operationId: getMenuMarquee
      tags: [menu]
      summary: Get the Menu-page suppliers band
      responses:
        "200":
          description: Suppliers band content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuMarquee"
    put:
      operationId: updateMenuMarquee
      tags: [menu]
      summary: Replace the Menu-page suppliers band
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuMarquee"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuMarquee"
        "400":
          description: Invalid content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AdminLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    AdminUser:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
    ChangePassword:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8

    Event:
      type: object
      required: [id, isoDate, title, description, tag, soldOut, sortOrder]
      properties:
        id:
          type: integer
        isoDate:
          type: string
        title:
          type: string
        description:
          type: string
        tag:
          type: string
        soldOut:
          type: boolean
        sortOrder:
          type: integer
    EventInput:
      type: object
      required: [isoDate, title]
      properties:
        isoDate:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        description:
          type: string
        tag:
          type: string
        soldOut:
          type: boolean
        sortOrder:
          type: integer
    EventUpdate:
      type: object
      properties:
        isoDate:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        description:
          type: string
        tag:
          type: string
        soldOut:
          type: boolean
        sortOrder:
          type: integer

    Message:
      type: object
      required: [id, kind, name, email, phone, company, supplyType, subject, message, handled, createdAt]
      properties:
        id:
          type: integer
        kind:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        supplyType:
          type: string
        subject:
          type: string
        message:
          type: string
        handled:
          type: boolean
        createdAt:
          type: string
    MessageInput:
      type: object
      required: [kind, name, email, message]
      properties:
        kind:
          type: string
          enum: [question, fournisseur, groupe]
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        phone:
          type: string
        company:
          type: string
        supplyType:
          type: string
        subject:
          type: string
        message:
          type: string
          minLength: 1
    MessageUpdate:
      type: object
      properties:
        handled:
          type: boolean

    MenuItem:
      type: object
      required: [id, categoryId, name, price, description, sortOrder]
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        name:
          type: string
        price:
          type: string
        description:
          type: string
        image:
          type: ["string", "null"]
        sortOrder:
          type: integer
    MenuItemInput:
      type: object
      required: [categoryId, name]
      properties:
        categoryId:
          type: integer
        name:
          type: string
          minLength: 1
        price:
          type: string
        description:
          type: string
        image:
          type: ["string", "null"]
        sortOrder:
          type: integer
    MenuItemUpdate:
      type: object
      properties:
        categoryId:
          type: integer
        name:
          type: string
          minLength: 1
        price:
          type: string
        description:
          type: string
        image:
          type: ["string", "null"]
        sortOrder:
          type: integer
    MenuCategoryBase:
      type: object
      required: [id, slug, label, tagline, sortOrder]
      properties:
        id:
          type: integer
        slug:
          type: string
        label:
          type: string
        tagline:
          type: string
        sortOrder:
          type: integer
    MenuCategory:
      type: object
      required: [id, slug, label, tagline, sortOrder, items]
      properties:
        id:
          type: integer
        slug:
          type: string
        label:
          type: string
        tagline:
          type: string
        sortOrder:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
    MenuCategoryInput:
      type: object
      required: [slug, label]
      properties:
        slug:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
        tagline:
          type: string
        sortOrder:
          type: integer
    MenuCategoryUpdate:
      type: object
      properties:
        slug:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
        tagline:
          type: string
        sortOrder:
          type: integer

    Hours:
      type: object
      required: [id, dayOfWeek, closed]
      properties:
        id:
          type: integer
        dayOfWeek:
          type: integer
        closed:
          type: boolean
        openHour:
          type: ["number", "null"]
        closeHour:
          type: ["number", "null"]
    HoursUpdate:
      type: object
      required: [closed]
      properties:
        closed:
          type: boolean
        openHour:
          type: ["number", "null"]
        closeHour:
          type: ["number", "null"]

    SitePhoto:
      type: object
      required: [id, slot, url, alt]
      properties:
        id:
          type: integer
        slot:
          type: string
        url:
          type: string
        alt:
          type: string
    SitePhotoUpdate:
      type: object
      required: [url]
      properties:
        url:
          type: string
          minLength: 1
        alt:
          type: string

    GroupFormule:
      type: object
      required: [name, kind, desc, price, unit, image]
      properties:
        name:
          type: string
        kind:
          type: string
        desc:
          type: string
        price:
          type: string
        unit:
          type: string
        image:
          type: string
    GroupOccasion:
      type: object
      required: [title, desc, image, tag]
      properties:
        title:
          type: string
        desc:
          type: string
        image:
          type: string
        tag:
          type: string
    GroupStep:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string
    GroupDetail:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string
    GroupTexts:
      type: object
      required:
        - heroMarker
        - heroTitle
        - heroLede
        - manifestoMarker
        - manifestoTitle
        - manifestoBody
        - manifestoQuote
        - signatureName
        - signatureRole
        - formulesMarker
        - formulesTitle
        - formulesLede
        - occasionsMarker
        - occasionsTitle
        - stepsMarker
        - stepsTitle
        - essentialTitle
        - essentialFootnote
      properties:
        heroMarker:
          type: string
        heroTitle:
          type: string
        heroLede:
          type: string
        manifestoMarker:
          type: string
        manifestoTitle:
          type: string
        manifestoBody:
          type: string
        manifestoQuote:
          type: string
        signatureName:
          type: string
        signatureRole:
          type: string
        formulesMarker:
          type: string
        formulesTitle:
          type: string
        formulesLede:
          type: string
        occasionsMarker:
          type: string
        occasionsTitle:
          type: string
        stepsMarker:
          type: string
        stepsTitle:
          type: string
        essentialTitle:
          type: string
        essentialFootnote:
          type: string
    GroupContent:
      type: object
      required: [texts, formules, occasions, steps, details]
      properties:
        texts:
          $ref: "#/components/schemas/GroupTexts"
        formules:
          type: array
          items:
            $ref: "#/components/schemas/GroupFormule"
        occasions:
          type: array
          items:
            $ref: "#/components/schemas/GroupOccasion"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/GroupStep"
        details:
          type: array
          items:
            $ref: "#/components/schemas/GroupDetail"
    AboutVoice:
      type: object
      required: [quote, name, role]
      properties:
        quote:
          type: string
        name:
          type: string
        role:
          type: string
    AboutSupplier:
      type: object
      required: [name, note]
      properties:
        name:
          type: string
        note:
          type: string
    AboutImages:
      type: object
      required: [hero, story1, story2, story3]
      properties:
        hero:
          type: string
        story1:
          type: string
        story2:
          type: string
        story3:
          type: string
    AboutTexts:
      type: object
      required:
        - heroMarker
        - heroTitle
        - heroLede
        - quote
        - storyP1
        - storyP2
        - voicesMarker
        - suppliersMarker
        - closingNote
      properties:
        heroMarker:
          type: string
        heroTitle:
          type: string
        heroLede:
          type: string
        quote:
          type: string
        storyP1:
